<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maintenance in Progress</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0b0f1a;
    --surface:#111827;
    --border:#1e293b;
    --primary:#6366f1;
    --primary-light:#818cf8;
    --accent:#a78bfa;
    --text:#e2e8f0;
    --muted:#94a3b8;
    --glow:rgba(99,102,241,.15);
  }
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--bg);color:var(--text);
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    overflow:hidden;position:relative;
  }
  body::before{
    content:'';position:absolute;inset:0;
    background:
      radial-gradient(ellipse 600px 600px at 20% 30%,rgba(99,102,241,.08),transparent),
      radial-gradient(ellipse 500px 500px at 80% 70%,rgba(167,139,250,.06),transparent);
    pointer-events:none;
  }

  .container{
    position:relative;z-index:1;
    max-width:560px;width:90%;text-align:center;
    padding:48px 40px;border-radius:24px;
    background:linear-gradient(145deg,rgba(17,24,39,.85),rgba(15,23,42,.95));
    border:1px solid var(--border);
    box-shadow:0 0 80px rgba(99,102,241,.08),0 25px 50px rgba(0,0,0,.4);
    backdrop-filter:blur(20px);
    animation:cardIn .8s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes cardIn{
    from{opacity:0;transform:translateY(30px) scale(.97)}
    to{opacity:1;transform:translateY(0) scale(1)}
  }

  .icon-wrap{
    width:88px;height:88px;margin:0 auto 28px;
    border-radius:50%;position:relative;
    display:flex;align-items:center;justify-content:center;
  }
  .icon-ring{
    position:absolute;inset:0;border-radius:50%;
    border:2px solid transparent;
    border-top-color:var(--primary);border-right-color:var(--accent);
    animation:spin 3s linear infinite;
  }
  .icon-ring-inner{
    position:absolute;inset:6px;border-radius:50%;
    border:2px solid transparent;
    border-bottom-color:var(--primary-light);border-left-color:rgba(167,139,250,.4);
    animation:spin 2s linear infinite reverse;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  .icon-bg{
    width:64px;height:64px;border-radius:50%;
    background:linear-gradient(135deg,var(--primary),var(--accent));
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 30px rgba(99,102,241,.3);
  }
  .icon-bg svg{width:32px;height:32px;color:#fff;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}

  h1{
    font-size:1.75rem;font-weight:700;letter-spacing:-.02em;
    margin-bottom:10px;
    background:linear-gradient(135deg,#e2e8f0,var(--primary-light));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .subtitle{
    font-size:.95rem;color:var(--muted);line-height:1.6;
    margin-bottom:32px;max-width:400px;margin-left:auto;margin-right:auto;
  }

  .divider{
    height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);
    margin:0 -20px 28px;
  }

  .message-box{
    padding:16px 20px;border-radius:14px;text-align:left;
    background:rgba(99,102,241,.06);
    border:1px solid rgba(99,102,241,.12);
  }
  .message-label{
    font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;
    color:var(--primary-light);font-weight:600;margin-bottom:8px;
    display:flex;align-items:center;gap:6px;
  }
  .message-label svg{width:14px;height:14px}
  .message-text{
    font-size:.92rem;color:var(--text);line-height:1.65;
  }

  .status-dots{
    display:flex;align-items:center;justify-content:center;gap:8px;
    margin-top:32px;
  }
  .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--primary);opacity:.4;
    animation:pulse 1.4s ease-in-out infinite;
  }
  .dot:nth-child(2){animation-delay:.2s;background:var(--primary-light)}
  .dot:nth-child(3){animation-delay:.4s;background:var(--accent)}
  @keyframes pulse{
    0%,100%{opacity:.3;transform:scale(.85)}
    50%{opacity:1;transform:scale(1.15)}
  }

  .status-text{
    font-size:.75rem;color:var(--muted);margin-top:12px;
    letter-spacing:.02em;
  }

  .footer{
    margin-top:40px;padding-top:20px;
    border-top:1px solid var(--border);
    font-size:.75rem;color:rgba(148,163,184,.5);
  }

  @media(max-width:480px){
    .container{padding:36px 24px;border-radius:18px}
    h1{font-size:1.45rem}
  }
</style>
</head>
<body>
  <div class="container">
    <div class="icon-wrap">
      <div class="icon-ring"></div>
      <div class="icon-ring-inner"></div>
      <div class="icon-bg">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
        </svg>
      </div>
    </div>

    <h1>We&rsquo;ll Be Right Back</h1>
    <p class="subtitle">Our system is currently undergoing scheduled maintenance to serve you better. We apologize for the inconvenience.</p>

    <div class="divider"></div>

    <div class="message-box">
      <div class="message-label">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/>
          <line x1="12" y1="8" x2="12.01" y2="8"/>
        </svg>
        Maintenance Notice
      </div>
      <div class="message-text" id="maintenanceMessage"></div>
    </div>

    <div class="status-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="status-text">Our team is working hard to get everything back online</div>

    <div class="footer">Dental Clinic &copy; 2026 &mdash; All rights reserved</div>
  </div>

<script>
  var msg = '__MAINTENANCE_MESSAGE__';
  var el = document.getElementById('maintenanceMessage');
  if (msg && msg.trim()) {
    el.textContent = msg;
  } else {
    el.textContent = 'We are currently performing scheduled maintenance. This should not take long. Thank you for your patience.';
  }
</script>
</body>
</html>
